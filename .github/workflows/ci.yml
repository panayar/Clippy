name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  swift-build:
    name: Build Mac App
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build (debug)
        working-directory: mac-app/ClippyBar
        run: swift build

  web-build:
    name: Build Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build
        working-directory: web
        run: npm run build
